<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="https://use.typekit.net/xkt8wwm.css">
    <link rel="stylesheet" href="ActualTrivia.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
<div class="container">
    <div class="top-info">
      <h1>Quiz Pop</h1>
      <p>Create your own Trivia</p>
    </div>

    <!-- Navigation Tabs -->
    <div class="nav-tabs">
      <button class="tab-button active" onclick="showTab('create')">Create Questions</button>
      <button class="tab-button" onclick="showTab('bank')">Question Bank</button>
      <button class="tab-button" onclick="showTab('quiz')">Take Quiz</button>
    </div>

    <!-- Create Questions Tab -->
    <div id="create-tab" class="tab-content active">
      <div class="question-form">
        <h2>Create a New Question</h2>
        
        <div class="form-group">
          <label for="topic">Topic:</label>
          <input type="text" id="topic" placeholder="e.g., Science, History, Sports">
        </div>

        <div class="form-group">
          <label for="question">Question:</label>
          <textarea id="question" placeholder="Enter your question here..."></textarea>
        </div>

        <div class="form-group">
          <label>Answer Options:</label>
          <div class="answers-grid">
            <div class="answer-item">
              <input type="checkbox" name="correct" value="0" id="correct1">
              <input type="text" id="answer1" placeholder="Answer 1">
            </div>
            <div class="answer-item">
              <input type="checkbox" name="correct" value="1" id="correct2">
              <input type="text" id="answer2" placeholder="Answer 2">
            </div>
            <div class="answer-item">
              <input type="checkbox" name="correct" value="2" id="correct3">
              <input type="text" id="answer3" placeholder="Answer 3">
            </div>
            <div class="answer-item">
              <input type="checkbox" name="correct" value="3" id="correct4">
              <input type="text" id="answer4" placeholder="Answer 4">
            </div>
          </div>
          <small>Select the check button next to the correct answer</small>
        </div>

        <button type="button" class="button" onclick="addQuestion()">Add Question</button>
        <button type="button" class="button secondary" onclick="clearForm()">Clear Form</button>
        <!-- <a href="Library.html">
        <button type="button" class="button">
            <span class="button--inner">Save to Library</span>
        </button>
        </a> -->

      </div>
    </div>

    <!-- Question Bank Tab -->
    <div id="bank-tab" class="tab-content">
      <div class="question-bank">
        <h2>Question Bank</h2>
        
        <div class="form-group">
          <label for="filter-topic">Filter by Topic:</label>
          <select id="filter-topic" onchange="filterQuestions()">
            <option value="">All Topics</option>
          </select>
        </div>

        <div id="questions-list">
          <div class="empty-state">Create your first question!</div>
        </div>
      </div>
    </div>

    <!-- Quiz Tab -->
    <div id="quiz-tab" class="tab-content">
      <!-- Quiz Setup -->
      <div id="quiz-setup" class="quiz-container">
        <h2>Start a Quiz</h2>
        
        <div class="form-group">
          <label for="quiz-topic">Select Topic:</label>
          <select id="quiz-topic">
            <option value="">All Topics</option>
          </select>
        </div>

        <div class="form-group">
          <label for="quiz-count">Number of Questions:</label>
          <select id="quiz-count">
            <option value="1">1 Questions</option>
            <option value="5">5 Questions</option>
            <option value="10" selected>10 Questions</option>
            <option value="15">15 Questions</option>
            <option value="20">20 Questions</option>
          </select>
        </div>

        <button type="button" class="button" onclick="startQuiz()">Start Quiz</button>
      </div>

      <!-- Quiz Game -->
      <div id="quiz-game" class="quiz-container hidden">
        <div class="quiz-progress">
          <div id="question-counter">Question 1 out of 10</div>
          <div class="progress-bar">
            <div id="progress-fill" class="progress-fill" style="width: 0%"></div>
          </div>
        </div>

        <div id="current-question" class="quiz-question">Question will appear here</div>
        
        <div id="quiz-answers" class="quiz-answers">
          <!-- Answers are made from the user in the Javascript file (TriviaLogic.JS) -->
        </div>

        <button type="button" id="next-btn" class="button" onclick="nextQuestion()" style="display: none;">Next Question</button>
        <button type="button" id="finish-btn" class="button" onclick="finishQuiz()" style="display: none;">Finish Quiz</button>
      </div>

      <!-- Quiz Results -->
      <div id="quiz-results" class="quiz-results hidden">
        <h2>Quiz Complete!</h2>
        <div id="final-score" class="score-display">0/0 (0%)</div>
        <div id="score-message">Great job!</div>
         <a href="ActualTrivia.html">
        <button type="button" class="button">
            <span class="button--inner">Make Another Quiz!</span>
        </button> 
        </a>
        <!--<button type="button" class="button" onclick="resetQuiz()">Take Another Quiz</button>-->
      </div>
    </div>
  </div>

    <script src="TriviaLogic.js"></script>
</body>
</html>
